# slide_map.template.yaml
# 配置先: 50_greenhouse/investor_deck/slide_map.yaml
#
# 役割: 全スライドの構成・並び順を1ファイルで定義し、人間が AI と「構成合意」するためのゲート。
#       このファイルを人間がレビュー・承認してから、AI は slides.md（本文）の生成に進む。
#
# 使い方:
#   1. AI が deck_brief.md と Soil を読んで、このテンプレートを埋めた slide_map.yaml を生成する
#   2. 人間が構成（スライドの並び・各スライドのメッセージ）を確認・修正する
#   3. 承認後、AI は slide_map.yaml に従って slides.md を生成する
#
# claim_ids: 00_soil/claims/claim_registry.yaml の claim_id と対応させる
# seedbank_assets: 20_seedbank/asset_index.yaml の asset_id と対応させる

artifact: investor_deck
version: <v001>
brief_ref: 50_greenhouse/investor_deck/deck_brief.md
generated_date: <YYYY-MM-DD>
total_slides: <12>
target_audience: <例：シードVC / 事業会社CVC>
deck_purpose: <例：ファーストミーティング前送付>

# human_approved: false に設定されている間は AI は slides.md の生成に進まない
human_approved: false
approved_by: ""
approved_date: ""

slides:
  - num: "00"
    title: <タイトルスライド>
    purpose: デッキ全体のタイトルと会社名・ロゴ
    key_message: ""
    claim_ids: []
    seedbank_assets: []
    notes: ""

  - num: "01"
    title: <問題提起>
    purpose: 解こうとしている課題と、それが誰にとって・なぜ重要かを示す
    key_message: <一文で：誰の、どんな課題を解くか>
    claim_ids:
      - <CL-XXXX-XXX>   # 課題の規模・深刻さを裏付ける claim
    seedbank_assets: []
    notes: <例：投資家の懸念Q1への回答スライド>

  - num: "02"
    title: <ソリューション>
    purpose: 自社のアプローチが課題をどう解くかを示す
    key_message: <一文で：どんな解決策か>
    claim_ids: []
    seedbank_assets:
      - <AST-XXX>   # システム構成図など
    notes: ""

  - num: "03"
    title: <市場規模>
    purpose: TAM / SAM / SOM の仮説と根拠を示す
    key_message: <一文で：市場の大きさと自社の狙い>
    claim_ids:
      - <CL-XXXX-XXX>   # 市場規模の根拠 claim
    seedbank_assets: []
    notes: <未確定の場合は missing_info.md に列挙すること>

  - num: "04"
    title: <プロダクト>
    purpose: プロダクトの具体像・機能・使い方を示す
    key_message: <一文で：何ができるプロダクトか>
    claim_ids: []
    seedbank_assets:
      - <AST-XXX>   # スクリーンショット・デモ動画サムネイル等
    notes: ""

  - num: "05"
    title: <ビジネスモデル>
    purpose: 誰から・どうやって収益を得るかを示す
    key_message: <一文で：収益の仕組み>
    claim_ids:
      - <CL-XXXX-XXX>   # ユニットエコノミクスの根拠
    seedbank_assets: []
    notes: ""

  - num: "06"
    title: <トラクション>
    purpose: 既存の進捗・実績・検証済みの仮説を示す
    key_message: <一文で：何を証明済みか>
    claim_ids:
      - <CL-XXXX-XXX>   # KPI・顧客数・MRR等の validated claim
    seedbank_assets: []
    notes: ""

  - num: "07"
    title: <競合優位性>
    purpose: なぜ既存解決策ではダメで、自社が勝てるかを示す
    key_message: <一文で：差別化の本質>
    claim_ids: []
    seedbank_assets:
      - <AST-XXX>   # 競合マトリクスなど
    notes: ""

  - num: "08"
    title: <チーム>
    purpose: このチームがなぜこの課題を解けるかを示す
    key_message: <一文で：チームの根拠>
    claim_ids: []
    seedbank_assets:
      - <AST-XXX>   # 顔写真・略歴
    notes: ""

  - num: "09"
    title: <ロードマップ / 今後の計画>
    purpose: 調達後の使途と今後12〜18ヶ月の計画を示す
    key_message: <一文で：調達で何を達成するか>
    claim_ids: []
    seedbank_assets: []
    notes: ""

  - num: "10"
    title: <資金調達 / Ask>
    purpose: 今回の調達額・条件・使途の内訳を示す
    key_message: <一文で：いくら・何のために>
    claim_ids: []
    seedbank_assets: []
    notes: ""

  - num: "11"
    title: <クロージング / コンタクト>
    purpose: 次のアクションと連絡先
    key_message: ""
    claim_ids: []
    seedbank_assets: []
    notes: ""

# 付録スライド（本編には含まないが、質疑応答で参照するもの）
appendix: []
# 例:
# appendix:
#   - num: "A01"
#     title: <技術詳細>
#     purpose: ""
#     claim_ids: []
