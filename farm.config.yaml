# farm.config.yaml
# farm 全体の運用設定。AI が成果物生成前に必ず参照する。
#
# このファイルは Farm Core が提供する「ひな型」です。
# 新しい Farm Instance を作るときは、以下の値を自分のプロジェクトに合わせて書き換えてください。
# プレースホルダ <...> をすべて埋めるまで、AI は生成を開始してはいけません。

farm:
  # この Farm Instance の識別名。例: farm-your-business, farm-your-product, farm-your-novel
  name: <your-farm-name>
  # この Farm Instance が依拠する Farm Core のバージョン。
  framework_version: 1.0.0
  # この Farm Instance 自身のバージョン。
  version: 0.1.0
  # 主要言語。AI 生成物の既定言語として使う。
  language: ja
  # この Farm Instance を作成した日付。
  created: <YYYY-MM-DD>

# 現在の主対象。AI は迷ったらここを起点に判断する。
# business / product / artifact は、下の businesses / artifacts に定義した id を参照する。
focus:
  business: <your-business-id>
  product: <your-product-id>
  artifact: <your-artifact-id>

# 取り扱う事業の一覧。Farm Instance ごとに自由に拡張する。
# soil_path は 00_soil 配下の、その事業の正規情報が置かれるディレクトリ。
businesses: []
# 例:
# businesses:
#   - id: your_business
#     status: active
#     soil_path: 00_soil/business
#     product_ids:
#       - your_product

# 取り扱う成果物の種類。greenhouse / harvest / grading / market 配下のサブパスと対応する。
# Farm Core はあくまで汎用枠だけを示し、実際の成果物は Instance 側で有効化する。
# 不要なものは status: planned のまま、または削除してよい。
# ユースケースに合わせて自由に artifact を追加・削除する。
artifacts:
  # ── 事業・資料系 ──────────────────────────────
  investor_deck:
    status: planned
    greenhouse: 50_greenhouse/investor_deck
    harvest: 60_harvest/investor_deck
    grading: 70_grading/investor_deck
    market: 80_market/investor_deck
  business_plan:
    status: planned
    greenhouse: 50_greenhouse/business_plan
    harvest: 60_harvest/business_plan
    grading: 70_grading/business_plan
    market: 80_market/business_plan
  sales_deck:
    status: planned
  lp:
    status: planned
  flyer:
    status: planned
  manual:
    status: planned

  # ── 長編コンテンツ系 ──────────────────────────
  novel:
    status: planned
    # 00_soil 構成例: characters/ world/ plot/ themes/ style/
  screenplay:
    status: planned
    # 00_soil 構成例: characters/ world/ acts/ scenes/ style/

  # ── 短・中尺コンテンツ系 ──────────────────────
  newsletter:
    status: planned
    # 00_soil 構成例: audience/ voice/ recurring_sections/ topics/
  article:
    status: planned
    # 00_soil 構成例: audience/ voice/ angle/ sources/
  video_script:
    status: planned
    # 00_soil 構成例: audience/ voice/ format/ hooks/

# 共通懸念（Objections）管理のパス。成果物生成時にAIが必ず参照する。
objections:
  common: 00_soil/objections/common_objections.md

# farm 自体の改善管理。
meta:
  intent: 00_soil/farm/farm_intent.md
  founder_context: 00_soil/farm/founder_context.md
  operating_model: 00_soil/farm/operating_model.md
  scope_model: 00_soil/farm/scope_model.md
  self_evolution: 00_soil/farm/self_evolution.md
  evolution_rules: 40_trellis/rules/farm_evolution_rules.md
  backlog: 90_weather/farm_backlog.md
  reviews: 90_weather/farm_reviews
  output_models: 00_soil/farm/output_models.md

# 生成と人間レビューの境界。harvest までは AI、grading 以降は人間が主導。
governance:
  ai_authoritative_until: 60_harvest
  human_required_from: 70_grading
  immutable_after: 80_market

# 命名規則。
naming:
  version_prefix: v
  version_format: v{number:03d}            # 例: v001
  release_dir_format: "{date}_{slug}"     # 例: 2026-05-12_seed_deck
  date_format: YYYY-MM-DD

# AI 作業ログの保管先。
logging:
  ai_work_log_dir: 90_weather/ai_work_logs
  decision_log: 90_weather/decision_log.md
  soil_changelog: 90_weather/soil_changelog.md
